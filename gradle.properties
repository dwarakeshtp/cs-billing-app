# 2GB is often too small for Kotlin + Compose + DEX; dexBuilder can look “stuck” under memory pressure.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
# Parallel builds can race on dex outputs and trigger:
# "Cannot access output property 'projectOutputs.dex'" / NoSuchFileException on *.dex under intermediates/.
org.gradle.parallel=false
# Build cache must match files on disk. If app/build was removed or IDE/CLI disagree, cached dex
# tasks can skip work and mergeProjectDexDebug fails: "Directory does not exist ... dexBuilderDebug/out".
org.gradle.caching=false
# macOS: avoids stale/missed folder events so dex intermediates stay consistent with tasks.
org.gradle.vfs.watch=false
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
